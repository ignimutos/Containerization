name: Build

on:
  workflow_dispatch:
  schedule:
    - cron: "47 7 * * *"
  push:
    paths:
      - "*/**"
      - "!*/README.md"
      - "!.github/**"

env:
  TZ: ${{ vars.TZ || 'Asia/Shanghai' }}
  FORCE: ${{ vars.FORCE || 'false' }}
  DEBUG: ${{ vars.DEBUG || 'false' }}
  GITHUB_TOKEN: ${{ github.token }}
  PLATFORM: ${{ vars.PLATFORM || 'linux/amd64' }}
  REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
  TARGETS: ${{ vars.TARGETS || '' }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout version
        uses: actions/checkout@v6
        with:
          path: version
          ref: version

      - name: Checkout main
        uses: actions/checkout@v6
        with:
          path: main
          ref: main
          submodules: true

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.REGISTRY || 'docker.io' }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASS }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Get changed files
        if: github.event_name == 'push'
        id: changed-files
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323
        with:
          path: main
          dir_names: true
          files: |
            */**
          files_ignore: |
            .github/**

      - name: Filter Pushed
        if: github.event_name == 'push'
        env:
          DIRS: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          targets=($TARGETS)
          for dir in ${DIRS}; do
            dir=$(echo "$dir" | cut -d'/' -f1)
            targets+=("$dir")
          done
          if [[ ${#targets[@]} -gt 0 ]]; then
            unique_targets=($(printf '%s\n' "${targets[@]}" | sort | uniq))
            echo "TARGETS=${unique_targets[*]}" >> $GITHUB_ENV
          fi

      - name: Build
        run: |
          cd main
          if [[ -z $TARGETS ]]; then
            bash build.sh
          else
            FORCE=true bash build.sh $TARGETS
          fi

      - name: Update Version Info
        run: |
          cd version
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "Nothing update"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump version"
          git push origin version

      - name: Telegram Notify
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=HTML \
            -d text="<b>Containerization</b>%0ABuild status: success%0ABuild Content: ${TARGETS:-all}"
